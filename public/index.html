<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HN Daily Digest</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />

    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Geist Sans"', "sans-serif"],
              mono: ['"Geist Mono"', "monospace"],
            },
            colors: {
              appBg: "#09090b",
              surface: "#18181b",
              surfaceHover: "#27272a",
              borderSubtle: "#27272a",
              borderHover: "#3f3f46",
              textMain: "#e4e4e7",
              textMuted: "#a1a1aa",
              hn: "#ff6600",
            },
            animation: { "fade-in": "fadeIn 0.3s ease-out forwards" },
            keyframes: {
              fadeIn: { "0%": { opacity: "0" }, "100%": { opacity: "1" } },
            },
          },
        },
      };
    </script>
    <style>
      @font-face {
        font-family: "Geist Sans";
        src: url("https://cdn.jsdelivr.net/npm/geist@1.7.0/dist/fonts/geist-sans/Geist-Variable.woff2")
          format("woff2");
        font-weight: 100 900;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: "Geist Mono";
        src: url("https://cdn.jsdelivr.net/npm/geist@1.7.0/dist/fonts/geist-mono/GeistMono-Variable.woff2")
          format("woff2");
        font-weight: 100 900;
        font-style: normal;
        font-display: swap;
      }

      body {
        background-color: #09090b;
        overflow: hidden;
      }
      ::-webkit-scrollbar {
        width: 5px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #3f3f46;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #52525b;
      }

      .prose {
        color: #a1a1aa;
        font-family: "Geist Sans", sans-serif;
        line-height: 1.75;
        font-size: 1.05rem;
      }
      .prose strong {
        color: #e4e4e7;
        font-weight: 500;
      }
      .prose h1,
      .prose h2,
      .prose h3 {
        color: #e4e4e7;
        font-weight: 500;
        letter-spacing: -0.02em;
        margin-top: 1.5em;
        margin-bottom: 0.5em;
      }
      .prose p {
        margin-bottom: 1.25em;
      }
      .prose ul > li::marker {
        color: #71717a;
      }
      .prose ul > li {
        margin-top: 0.25em;
        margin-bottom: 0.25em;
      }

      .prose img,
      .prose video {
        max-width: 100%;
        height: auto;
        border-radius: 0.5rem;
        margin-top: 1.5em;
        margin-bottom: 1.5em;
        border: 1px solid #27272a;
      }
      .prose iframe {
        width: 100%;
        aspect-ratio: 16 / 9;
        border-radius: 0.5rem;
        margin-top: 1.5em;
        margin-bottom: 1.5em;
        border: 1px solid #27272a;
        background: #09090b;
      }

      .story-card {
        transition: all 0.2s ease-in-out;
      }
      .is-read {
        background-color: rgba(255, 102, 0, 0.03);
        border-color: rgba(255, 102, 0, 0.1);
        opacity: 0.75;
      }
      .is-read:hover {
        opacity: 1;
        background-color: rgba(255, 102, 0, 0.06);
      }
      .is-active {
        background-color: #27272a !important;
        border-color: #3f3f46 !important;
        opacity: 1 !important;
      }
      body.hide-read-active .story-card.is-read {
        display: none !important;
      }

      select {
        -webkit-appearance: none;
        -moz-appearance: none;
        appearance: none;
      }

      .activity-grid {
        display: grid;
        grid-template-rows: repeat(7, 1fr);
        grid-auto-flow: column;
        gap: 3px;
      }

      dialog::backdrop {
        background: rgba(0, 0, 0, 0.75);
        backdrop-filter: blur(8px);
      }

      #commentsBody.hn-thread-root {
        padding: 0.75rem 0.875rem 1.25rem;
        background: linear-gradient(180deg, #0c0c0e 0%, #09090b 120px);
      }

      .hn-comment-block {
        margin-bottom: 0.625rem;
      }
      .hn-comment-block[data-depth="0"] {
        margin-bottom: 1rem;
      }

      .hn-comment-card {
        display: flex;
        align-items: stretch;
        border-radius: 0.625rem;
        border: 1px solid #27272a;
        background: #141416;
        overflow: hidden;
        transition: border-color 0.15s ease, box-shadow 0.15s ease,
          background 0.15s ease;
      }
      .hn-comment-card:hover {
        border-color: #3f3f46;
        background: #18181b;
        box-shadow: 0 1px 0 rgba(255, 255, 255, 0.04) inset;
      }

      .hn-comment-rail {
        width: 5px;
        flex-shrink: 0;
        background: #52525b;
      }
      .hn-comment-block[data-rail="0"] .hn-comment-rail {
        background: linear-gradient(180deg, #ff8533, #ff6600);
      }
      .hn-comment-block[data-rail="1"] .hn-comment-rail {
        background: linear-gradient(180deg, #a78bfa, #7c3aed);
      }
      .hn-comment-block[data-rail="2"] .hn-comment-rail {
        background: linear-gradient(180deg, #5eead4, #14b8a6);
      }
      .hn-comment-block[data-rail="3"] .hn-comment-rail {
        background: linear-gradient(180deg, #7dd3fc, #0ea5e9);
      }
      .hn-comment-block[data-rail="4"] .hn-comment-rail {
        background: linear-gradient(180deg, #fcd34d, #d97706);
      }

      .hn-comment-inner {
        flex: 1;
        min-width: 0;
        padding: 0.7rem 0.85rem 0.85rem;
      }

      .hn-comment-meta {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.35rem 0.65rem;
        margin-bottom: 0.55rem;
        padding-bottom: 0.45rem;
        border-bottom: 1px solid rgba(39, 39, 42, 0.85);
      }
      .hn-comment-author {
        font-size: 0.8125rem;
        font-weight: 600;
        color: #f4f4f5;
        letter-spacing: -0.01em;
      }
      .hn-comment-time {
        font-size: 0.625rem;
        font-family: "Geist Mono", ui-monospace, monospace;
        color: #71717a;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      .hn-comment-depth {
        font-size: 0.5625rem;
        font-family: "Geist Mono", ui-monospace, monospace;
        color: #52525b;
        padding: 0.15rem 0.4rem;
        border-radius: 0.25rem;
        background: rgba(39, 39, 42, 0.9);
        border: 1px solid #27272a;
      }

      .hn-comment-body {
        font-size: 0.8125rem;
        line-height: 1.65;
        color: #c4c4cc;
      }
      .hn-comment-body a {
        color: #ff8533;
        text-decoration: underline;
        text-underline-offset: 2px;
      }
      .hn-comment-body a:hover {
        color: #ff6600;
      }
      .hn-comment-body p {
        margin-bottom: 0.55rem;
      }
      .hn-comment-body p:last-child {
        margin-bottom: 0;
      }
      .hn-comment-body pre,
      .hn-comment-body code {
        font-family: "Geist Mono", ui-monospace, monospace;
        font-size: 0.75rem;
      }
      .hn-comment-body pre {
        overflow-x: auto;
        margin: 0.5rem 0;
        padding: 0.5rem 0.65rem;
        border-radius: 0.375rem;
        background: #09090b;
        border: 1px solid #27272a;
      }

      .hn-replies {
        margin-top: 0.45rem;
        margin-left: 0.35rem;
        padding-left: 0.75rem;
        border-left: 2px solid rgba(63, 63, 70, 0.55);
      }
      .hn-comment-block[data-depth="0"] > .hn-replies {
        margin-left: 0.15rem;
        padding-left: 0.85rem;
        border-left-color: rgba(255, 102, 0, 0.22);
      }

      .hn-thread-note {
        margin-top: 1rem;
        padding: 0.75rem 0.85rem;
        border-radius: 0.5rem;
        border: 1px solid #27272a;
        background: rgba(255, 102, 0, 0.06);
        font-size: 0.6875rem;
        font-family: "Geist Mono", ui-monospace, monospace;
        color: #a1a1aa;
        line-height: 1.5;
      }
    </style>
  </head>
  <body
    class="bg-appBg text-textMain font-sans h-screen flex antialiased selection:bg-hn selection:text-white"
  >
    <aside
      id="feedPane"
      class="w-full md:w-[380px] lg:w-[420px] flex flex-col h-full border-r border-borderSubtle bg-appBg shrink-0 relative z-20 transition-transform duration-300"
    >
      <header
        class="shrink-0 pt-5 [&>div]:px-5 border-b border-borderSubtle bg-appBg/90 backdrop-blur-md z-10 sticky top-0"
      >
        <div class="flex justify-between items-center mb-4">
          <div class="flex items-center gap-3">
            <div
              class="w-5 h-5 rounded border border-hn/30 bg-hn/10 flex items-center justify-center"
            >
              <div class="w-2 h-2 rounded-full bg-hn"></div>
            </div>
            <h1 class="text-sm font-semibold tracking-tight text-textMain">
              hn.digest
            </h1>
          </div>

          <div class="flex items-center gap-2">
            <button
              id="openSettingsBtn"
              type="button"
              class="text-textMuted hover:text-white transition-colors"
              title="API key"
            >
              <svg
                class="w-4 h-4"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"
                ></path>
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                ></path>
              </svg>
            </button>
            <div class="relative">
              <select
                id="langSelect"
                class="bg-surface border border-borderSubtle text-textMuted text-[10px] font-mono rounded px-2 py-1 pr-6 cursor-pointer hover:text-textMain hover:border-borderHover transition-colors focus:outline-none uppercase shadow-sm"
              ></select>
              <div
                class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-1.5 text-textMuted"
              >
                <svg
                  class="w-3 h-3"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M19 9l-7 7-7-7"
                  ></path>
                </svg>
              </div>
            </div>

            <div
              id="status"
              class="text-[10px] font-mono text-textMuted bg-surface border border-borderSubtle px-2 py-1 rounded flex items-center gap-1.5 shadow-sm"
            >
              <span
                class="w-1.5 h-1.5 rounded-full bg-hn animate-pulse"
                id="statusDot"
              ></span>
              <span id="statusText">Live</span>
            </div>
          </div>
        </div>

        <div class="pt-4 border-t border-borderSubtle">
          <div class="flex items-center justify-between mb-2.5">
            <span
              class="text-[10px] text-textMuted font-mono uppercase tracking-wider"
              >Reading Activity</span
            >
            <span
              id="totalReadsText"
              class="text-[10px] font-mono text-hn font-medium"
              >0 Total</span
            >
          </div>
          <div class="overflow-x-hidden flex justify-end">
            <div id="activityGraph" class="activity-grid"></div>
          </div>
        </div>

        <div
          class="flex items-center justify-between mt-4 py-2 border-t border-borderSubtle"
        >
          <span class="text-xs text-textMuted font-medium"
            >Hide read posts</span
          >
          <button
            id="hideReadToggle"
            class="w-8 h-4.5 bg-surface border border-borderSubtle rounded-full relative transition-colors duration-200 focus:outline-none flex items-center px-0.5 hover:border-hn/50"
          >
            <div
              id="toggleKnob"
              class="w-3.5 h-3.5 bg-textMuted rounded-full shadow-sm transform transition-transform duration-200 translate-x-0"
            ></div>
          </button>
        </div>
      </header>

      <div
        class="flex-1 overflow-y-auto p-4 space-y-3 pb-24"
        id="feedList"
      ></div>

      <div
        class="shrink-0 p-4 border-t border-borderSubtle bg-appBg text-center"
      >
        <button
          id="loadMoreBtn"
          class="hidden w-full bg-surface border border-borderSubtle text-textMuted hover:text-hn hover:border-hn/50 px-4 py-2.5 rounded-lg text-xs font-medium transition-all duration-300 disabled:opacity-50 shadow-sm"
        >
          Load More
        </button>
      </div>
    </aside>

    <main
      id="readerPane"
      class="flex-1 h-full bg-surface relative hidden md:flex flex-col overflow-hidden"
    >
      <div
        id="emptyState"
        class="absolute inset-0 flex flex-col items-center justify-center text-textMuted animate-fade-in"
      >
        <svg
          class="w-12 h-12 mb-4 text-borderSubtle"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="1"
            d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10l6 6v10a2 2 0 01-2 2z"
          ></path>
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="1"
            d="M14 4v5h5M10 14h4M10 18h4M8 10h8"
          ></path>
        </svg>
        <p class="text-sm">Select a story to generate summary</p>
      </div>

      <div
        id="commentsBackdrop"
        class="hidden fixed inset-0 z-30 bg-black/60 backdrop-blur-[2px] md:!hidden"
        aria-hidden="true"
      ></div>

      <div
        id="readerWorkspace"
        class="hidden flex-1 min-h-0 min-w-0 flex-col"
      >
        <div
          id="readerSplit"
          class="flex flex-1 min-h-0 min-w-0 flex-col md:flex-row"
        >
          <div
            id="readerContent"
            class="hidden flex-1 min-w-0 min-h-0 flex-col overflow-y-auto w-full relative"
          >
            <div
              class="sticky top-0 z-20 bg-surface/95 backdrop-blur-xl border-b border-borderSubtle shadow-sm flex flex-col shrink-0"
            >
              <div class="md:hidden p-4 border-b border-borderSubtle">
                <button
                  id="mobileBackBtn"
                  type="button"
                  class="text-sm text-textMuted hover:text-textMain flex items-center gap-2"
                >
                  <svg
                    class="w-4 h-4"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M15 19l-7-7 7-7"
                    ></path>
                  </svg>
                  Back to Feed
                </button>
              </div>

              <div
                class="px-6 py-8 md:py-10 md:px-10 lg:px-16 flex flex-col items-center"
              >
                <div class="w-full max-w-2xl text-left">
                  <h2
                    id="readerTitle"
                    class="text-lg sm:text-xl md:text-2xl font-medium tracking-tight text-textMain leading-snug selection:bg-hn selection:text-white"
                  ></h2>

                  <div
                    class="flex flex-wrap items-center justify-start gap-3 md:gap-4 mt-5"
                  >
                    <div
                      id="readerStatus"
                      class="inline-flex items-center gap-2 px-3 py-1.5 rounded-md text-[11px] font-mono border border-borderSubtle bg-appBg text-textMuted uppercase tracking-wider shadow-sm"
                    >
                      Loading...
                    </div>
                    <a
                      id="readerLink"
                      href="#"
                      target="_blank"
                      rel="noopener noreferrer"
                      class="text-[13px] text-textMuted hover:text-hn underline underline-offset-4 hidden transition-colors font-medium"
                      >Read Source ↗</a
                    >
                    <button
                      id="readerHnBtn"
                      type="button"
                      class="text-[13px] text-textMuted hover:text-hn underline underline-offset-4 hidden transition-colors font-medium"
                    >
                      HN Comments
                    </button>
                  </div>
                </div>
              </div>
            </div>

            <div
              class="px-6 md:px-10 lg:px-16 pb-28 md:pb-32 flex flex-col items-center w-full"
            >
              <div
                id="readerBody"
                class="prose prose-invert w-full max-w-2xl mx-auto selection:bg-hn selection:text-white"
              ></div>
            </div>
          </div>

          <aside
            id="commentsPane"
            class="hidden flex-col bg-appBg border-borderSubtle z-40 min-h-0 md:z-10 md:w-[min(420px,38vw)] md:max-w-[480px] md:shrink-0 md:border-l max-md:fixed max-md:inset-y-0 max-md:right-0 max-md:w-full max-md:max-w-md max-md:border-l max-md:shadow-2xl"
          >
            <div
              class="shrink-0 flex items-center justify-between gap-3 px-4 py-3 border-b border-borderSubtle bg-surface/80 backdrop-blur-md"
            >
              <span class="text-sm font-medium text-textMain tracking-tight"
                >Thread</span
              >
              <div class="flex items-center gap-2 shrink-0">
                <a
                  id="commentsExternalLink"
                  href="#"
                  target="_blank"
                  rel="noopener noreferrer"
                  class="text-[11px] font-mono text-textMuted hover:text-hn uppercase tracking-wider"
                  >HN ↗</a
                >
                <button
                  id="closeCommentsBtn"
                  type="button"
                  class="w-8 h-8 rounded-lg border border-borderSubtle text-textMuted hover:text-textMain hover:border-borderHover flex items-center justify-center text-lg leading-none"
                  aria-label="Close comments"
                >
                  ×
                </button>
              </div>
            </div>
            <div
              id="commentsBody"
              class="hn-thread-root flex-1 overflow-y-auto text-textMuted"
            ></div>
          </aside>
        </div>
      </div>
    </main>

    <dialog
      id="settingsModal"
      class="bg-surface border border-borderSubtle rounded-2xl p-8 max-w-md w-[90vw] mx-auto shadow-2xl relative text-left"
    >
      <button
        id="closeSettingsBtn"
        type="button"
        class="absolute top-5 right-5 text-textMuted hover:text-white"
      >
        &times;
      </button>
      <h2 class="text-xl font-medium text-white mb-2">API key</h2>
      <p class="text-sm text-textMuted mb-6">
        Your OpenAI key is saved in this browser only. It is sent to this app’s
        server in the Authorization header when you request a summary.
      </p>

      <input
        type="password"
        id="apiKeyInput"
        placeholder="sk-..."
        autocomplete="off"
        class="w-full bg-appBg border border-borderSubtle rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-hn mb-6 font-mono"
      />

      <div class="flex justify-end gap-3">
        <button
          id="clearKeyBtn"
          type="button"
          class="px-4 py-2 rounded-lg text-sm text-textMuted hover:text-white transition-colors"
        >
          Clear
        </button>
        <button
          id="saveKeyBtn"
          type="button"
          class="px-4 py-2 rounded-lg text-sm bg-textMain text-black hover:bg-white font-medium transition-colors"
        >
          Save
        </button>
      </div>
    </dialog>

    <script>
      const SUPPORTED_LANGUAGES = [
        { code: "en", name: "ENG" },
        { code: "tr", name: "TR" },
        { code: "es", name: "ES" },
      ];

      let currentLang = localStorage.getItem("preferredLang") || "en";
      let activeCardId = null;
      let currentActiveStory = null;

      const settingsModal = document.getElementById("settingsModal");
      const openSettingsBtn = document.getElementById("openSettingsBtn");
      const closeSettingsBtn = document.getElementById("closeSettingsBtn");
      const saveKeyBtn = document.getElementById("saveKeyBtn");
      const clearKeyBtn = document.getElementById("clearKeyBtn");
      const apiKeyInput = document.getElementById("apiKeyInput");

      openSettingsBtn.addEventListener("click", () => {
        apiKeyInput.value = localStorage.getItem("openai_api_key") || "";
        settingsModal.showModal();
      });
      closeSettingsBtn.addEventListener("click", () => settingsModal.close());

      saveKeyBtn.addEventListener("click", () => {
        if (apiKeyInput.value.trim()) {
          localStorage.setItem("openai_api_key", apiKeyInput.value.trim());
          settingsModal.close();
          if (currentActiveStory && activeCardId) {
            handleCardClick(
              currentActiveStory,
              document.getElementById(`card-${activeCardId}`)
            );
          }
        }
      });

      clearKeyBtn.addEventListener("click", () => {
        localStorage.removeItem("openai_api_key");
        apiKeyInput.value = "";
      });

      // Language Selector Logic
      const langSelect = document.getElementById("langSelect");
      SUPPORTED_LANGUAGES.forEach((lang) => {
        const option = document.createElement("option");
        option.value = lang.code;
        option.textContent = lang.name;
        if (lang.code === currentLang) option.selected = true;
        langSelect.appendChild(option);
      });

      langSelect.addEventListener("change", (e) => {
        currentLang = e.target.value;
        localStorage.setItem("preferredLang", currentLang);
        if (currentActiveStory && activeCardId) {
          const currentCard = document.getElementById(`card-${activeCardId}`);
          handleCardClick(currentActiveStory, currentCard);
        }
      });

      const feedList = document.getElementById("feedList");
      const statusDot = document.getElementById("statusDot");
      const loadMoreBtn = document.getElementById("loadMoreBtn");
      const readerPane = document.getElementById("readerPane");
      const feedPane = document.getElementById("feedPane");
      const emptyState = document.getElementById("emptyState");
      const readerContent = document.getElementById("readerContent");
      const readerTitle = document.getElementById("readerTitle");
      const readerStatus = document.getElementById("readerStatus");
      const readerBody = document.getElementById("readerBody");
      const readerLink = document.getElementById("readerLink");
      const readerHnBtn = document.getElementById("readerHnBtn");
      const readerWorkspace = document.getElementById("readerWorkspace");
      const commentsPane = document.getElementById("commentsPane");
      const commentsBody = document.getElementById("commentsBody");
      const commentsBackdrop = document.getElementById("commentsBackdrop");
      const closeCommentsBtn = document.getElementById("closeCommentsBtn");
      const commentsExternalLink = document.getElementById("commentsExternalLink");
      const mobileBackBtn = document.getElementById("mobileBackBtn");

      let currentPage = 1;
      let hideReadActive = false;

      const hideReadToggle = document.getElementById("hideReadToggle");
      const toggleKnob = document.getElementById("toggleKnob");

      hideReadToggle.addEventListener("click", () => {
        hideReadActive = !hideReadActive;
        document.body.classList.toggle("hide-read-active", hideReadActive);
        if (hideReadActive) {
          toggleKnob.classList.replace("translate-x-0", "translate-x-[14px]");
          toggleKnob.classList.replace("bg-textMuted", "bg-hn");
          hideReadToggle.classList.add("border-hn/50");
        } else {
          toggleKnob.classList.replace("translate-x-[14px]", "translate-x-0");
          toggleKnob.classList.replace("bg-hn", "bg-textMuted");
          hideReadToggle.classList.remove("border-hn/50");
        }
      });

      function timeAgo(unixTimestamp) {
        const seconds = Math.floor(
          (new Date() - new Date(unixTimestamp * 1000)) / 1000
        );
        let interval = seconds / 31536000;
        if (interval > 1) return Math.floor(interval) + "y ago";
        interval = seconds / 2592000;
        if (interval > 1) return Math.floor(interval) + "mo ago";
        interval = seconds / 86400;
        if (interval > 1) return Math.floor(interval) + "d ago";
        interval = seconds / 3600;
        if (interval > 1) return Math.floor(interval) + "h ago";
        interval = seconds / 60;
        if (interval > 1) return Math.floor(interval) + "m ago";
        return Math.floor(seconds) + "s ago";
      }

      function getReadStats() {
        return JSON.parse(localStorage.getItem("readStats") || "{}");
      }

      function renderActivityGraph() {
        const graphEl = document.getElementById("activityGraph");
        const totalReadsEl = document.getElementById("totalReadsText");
        graphEl.innerHTML = "";

        const stats = getReadStats();
        const totalReads = Object.values(stats).reduce(
          (sum, count) => sum + count,
          0
        );
        totalReadsEl.textContent = `${totalReads} Total`;

        const today = new Date();
        const currentDayOfWeek = today.getDay();
        const numWeeks = 20;
        const totalDays = numWeeks * 7 + (currentDayOfWeek + 1);

        const daysArr = [];
        for (let i = totalDays - 1; i >= 0; i--) {
          const d = new Date();
          d.setDate(today.getDate() - i);
          const year = d.getFullYear();
          const month = String(d.getMonth() + 1).padStart(2, "0");
          const day = String(d.getDate()).padStart(2, "0");
          daysArr.push(`${year}-${month}-${day}`);
        }

        daysArr.forEach((dateStr) => {
          const count = stats[dateStr] || 0;
          let colorClass = "bg-surfaceHover";
          if (count > 0 && count <= 2) colorClass = "bg-hn/30";
          else if (count > 2 && count <= 5) colorClass = "bg-hn/60";
          else if (count > 5) colorClass = "bg-hn";

          const cell = document.createElement("div");
          cell.className = `w-[9px] h-[9px] rounded-[2px] transition-colors duration-300 ${colorClass}`;
          cell.title = `${count} posts read on ${dateStr}`;
          graphEl.appendChild(cell);
        });
      }

      function getReadStories() {
        return JSON.parse(localStorage.getItem("readStories") || "[]");
      }

      function markAsRead(id) {
        const read = getReadStories();
        if (!read.includes(id)) {
          read.push(id);
          localStorage.setItem("readStories", JSON.stringify(read));

          const stats = getReadStats();
          const todayDate = new Date();
          const year = todayDate.getFullYear();
          const month = String(todayDate.getMonth() + 1).padStart(2, "0");
          const day = String(todayDate.getDate()).padStart(2, "0");
          const todayStr = `${year}-${month}-${day}`;

          stats[todayStr] = (stats[todayStr] || 0) + 1;
          localStorage.setItem("readStats", JSON.stringify(stats));

          renderActivityGraph();
        }
      }

      function isRead(id) {
        return getReadStories().includes(id);
      }

      function applyReadState(story, cardElement) {
        cardElement.classList.add("is-read");
        const icon = cardElement.querySelector(".check-icon");
        if (icon) icon.classList.replace("hidden", "block");
        markAsRead(story.id);
      }

      function closeCommentsPanel() {
        commentsPane.classList.add("hidden");
        commentsPane.classList.remove("flex");
        commentsBackdrop.classList.add("hidden");
      }

      closeCommentsBtn.addEventListener("click", closeCommentsPanel);
      commentsBackdrop.addEventListener("click", closeCommentsPanel);

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape" && !commentsPane.classList.contains("hidden")) {
          closeCommentsPanel();
        }
      });

      readerHnBtn.addEventListener("click", () => {
        if (!currentActiveStory) return;
        commentsPane.classList.remove("hidden");
        commentsPane.classList.add("flex");
        if (window.innerWidth < 768) {
          commentsBackdrop.classList.remove("hidden");
        }
        commentsExternalLink.href = `https://news.ycombinator.com/item?id=${currentActiveStory.id}`;
        loadHnComments(currentActiveStory.id, commentsBody);
      });

      const HN_ITEM_CACHE_KEY = "hn_digest_hn_items_v1";
      const HN_ITEM_CACHE_MAX = 1000;
      const HN_ITEM_CACHE_TTL_MS = 45 * 60 * 1000;

      function hnItemCacheLoad() {
        try {
          const raw = localStorage.getItem(HN_ITEM_CACHE_KEY);
          if (!raw) return { items: {}, order: [] };
          const o = JSON.parse(raw);
          if (!o || typeof o.items !== "object" || !Array.isArray(o.order)) {
            return { items: {}, order: [] };
          }
          return o;
        } catch {
          return { items: {}, order: [] };
        }
      }

      function hnItemCacheSave(cache) {
        try {
          localStorage.setItem(HN_ITEM_CACHE_KEY, JSON.stringify(cache));
        } catch (e) {
          console.warn("HN item cache: storage full, trimming", e);
          const half = Math.floor(cache.order.length / 2);
          for (let i = 0; i < half; i++) {
            const v = cache.order.shift();
            if (v) delete cache.items[v];
          }
          try {
            localStorage.setItem(HN_ITEM_CACHE_KEY, JSON.stringify(cache));
          } catch {
            /* ignore */
          }
        }
      }

      function hnItemCacheGet(id) {
        const sid = String(id);
        const cache = hnItemCacheLoad();
        const entry = cache.items[sid];
        if (!entry) return null;
        if (Date.now() - entry.t > HN_ITEM_CACHE_TTL_MS) {
          delete cache.items[sid];
          cache.order = cache.order.filter((x) => x !== sid);
          hnItemCacheSave(cache);
          return null;
        }
        return entry.data;
      }

      function hnItemCacheSet(id, data) {
        const sid = String(id);
        const cache = hnItemCacheLoad();
        const existed = !!cache.items[sid];
        cache.items[sid] = { t: Date.now(), data };
        if (!existed) {
          cache.order.push(sid);
          while (cache.order.length > HN_ITEM_CACHE_MAX) {
            const victim = cache.order.shift();
            if (victim) delete cache.items[victim];
          }
        }
        hnItemCacheSave(cache);
      }

      function applyBlankTargets(root) {
        if (!root) return;
        root.querySelectorAll("a[href]").forEach((a) => {
          const href = a.getAttribute("href");
          if (!href || href.startsWith("#")) return;
          a.setAttribute("target", "_blank");
          a.setAttribute("rel", "noopener noreferrer");
        });
      }

      async function fetchHnItem(id) {
        const cached = hnItemCacheGet(id);
        if (cached !== null) return cached;
        const res = await fetch(
          `https://hacker-news.firebaseio.com/v0/item/${id}.json`
        );
        const data = await res.json();
        hnItemCacheSet(id, data);
        return data;
      }

      function hnCommentBlock(item, depth) {
        const block = document.createElement("div");
        block.className = "hn-comment-block";
        block.dataset.depth = String(depth);
        block.dataset.rail = String(depth % 5);

        const article = document.createElement("article");
        article.className = "hn-comment-card";

        const rail = document.createElement("div");
        rail.className = "hn-comment-rail";
        rail.setAttribute("aria-hidden", "true");

        const inner = document.createElement("div");
        inner.className = "hn-comment-inner";

        const meta = document.createElement("header");
        meta.className = "hn-comment-meta w-full";

        const author = document.createElement("span");
        author.className = "hn-comment-author";
        author.textContent = item.by || "[deleted]";
        meta.appendChild(author);

        if (item.time) {
          const when = document.createElement("span");
          when.className = "hn-comment-time";
          when.textContent = timeAgo(item.time);
          meta.appendChild(when);
        }

        if (depth > 0) {
          const depthBadge = document.createElement("span");
          depthBadge.className = "hn-comment-depth shrink-0 ml-auto";
          depthBadge.textContent = `L${depth}`;
          depthBadge.title = `Reply depth ${depth}`;
          meta.appendChild(depthBadge);
        }

        const body = document.createElement("div");
        body.className = "hn-comment-body";
        body.innerHTML = item.text || (item.dead ? "[dead]" : "");
        applyBlankTargets(body);

        inner.appendChild(meta);
        inner.appendChild(body);
        article.appendChild(rail);
        article.appendChild(inner);
        block.appendChild(article);

        let replies = null;
        if (item.kids && item.kids.length > 0) {
          replies = document.createElement("div");
          replies.className = "hn-replies";
          if (depth === 0) replies.classList.add("hn-replies--root");
          block.appendChild(replies);
        }

        return { block, replies };
      }

      async function loadHnComments(storyId, container) {
        container.innerHTML =
          '<p class="px-3 py-6 text-center text-sm text-textMuted font-mono tracking-wide">Loading thread…</p>';
        const TOP_LEVEL_BATCH = 20;
        const NESTED_KIDS_CAP = 25;
        const state = { fetched: 0 };
        const MAX_FETCH = 500;

        try {
          const story = await fetchHnItem(storyId);
          if (!story) {
            container.innerHTML =
              '<p class="text-textMuted text-sm">Could not load story.</p>';
            return;
          }
          if (!story.kids || story.kids.length === 0) {
            container.innerHTML =
              '<p class="text-textMuted text-sm">No comments yet.</p>';
            return;
          }

          container.innerHTML = "";
          const listRoot = document.createElement("div");
          listRoot.className = "hn-comments-list";
          const footer = document.createElement("div");
          footer.className =
            "hn-comments-footer flex flex-col gap-2 mt-3 px-0.5 pb-2";
          container.appendChild(listRoot);
          container.appendChild(footer);

          const allRootIds = story.kids;
          let rootOffset = 0;

          async function walk(ids, depth, parentEl) {
            if (!ids?.length || depth > 12 || state.fetched >= MAX_FETCH) return;
            const idBatch =
              depth === 0 ? ids : ids.slice(0, NESTED_KIDS_CAP);
            const items = await Promise.all(
              idBatch.map((id) => fetchHnItem(id))
            );
            for (const item of items) {
              if (state.fetched >= MAX_FETCH) break;
              if (!item || item.type !== "comment" || item.deleted) continue;
              state.fetched++;
              const { block, replies } = hnCommentBlock(item, depth);
              parentEl.appendChild(block);
              if (replies) {
                await walk(item.kids, depth + 1, replies);
              }
            }
          }

          function pruneEmptyReplyBuckets(root) {
            root.querySelectorAll(".hn-replies").forEach((el) => {
              if (!el.querySelector(".hn-comment-block")) el.remove();
            });
          }

          async function appendRootBatch(loadMoreBtn) {
            const nextIds = allRootIds.slice(
              rootOffset,
              rootOffset + TOP_LEVEL_BATCH
            );
            if (!nextIds.length) return;

            if (loadMoreBtn) {
              loadMoreBtn.disabled = true;
              loadMoreBtn.textContent = "Loading…";
            }

            let loadedInBatch = 0;
            for (const id of nextIds) {
              if (state.fetched >= MAX_FETCH) break;
              await walk([id], 0, listRoot);
              loadedInBatch++;
            }
            rootOffset += loadedInBatch;
            pruneEmptyReplyBuckets(container);

            const remaining = allRootIds.length - rootOffset;
            footer.innerHTML = "";

            const meta = document.createElement("p");
            meta.className =
              "text-[10px] font-mono text-textMuted text-center uppercase tracking-wider";
            meta.textContent = `Top-level ${Math.min(rootOffset, allRootIds.length)} / ${allRootIds.length}`;
            footer.appendChild(meta);

            if (remaining > 0 && state.fetched < MAX_FETCH) {
              const btn = document.createElement("button");
              btn.type = "button";
              btn.className =
                "w-full py-2.5 px-4 rounded-lg text-xs font-medium border border-borderSubtle bg-surface text-textMuted hover:text-hn hover:border-hn/40 transition-colors disabled:opacity-50";
              btn.textContent = `Load more comments (${remaining} remaining)`;
              btn.addEventListener("click", () => appendRootBatch(btn));
              footer.appendChild(btn);
            }

            if (state.fetched >= MAX_FETCH && rootOffset < allRootIds.length) {
              const note = document.createElement("p");
              note.className = "hn-thread-note";
              note.textContent =
                "Fetch limit reached for this session. Open on HN for the full thread.";
              footer.appendChild(note);
            }
          }

          await appendRootBatch(null);

          if (!listRoot.querySelector(".hn-comment-block")) {
            container.innerHTML =
              '<p class="px-3 py-8 text-center text-sm text-textMuted">No comments to show.</p>';
            return;
          }
        } catch (e) {
          console.error(e);
          container.innerHTML =
            '<p class="text-red-400/90 text-sm">Failed to load comments.</p>';
        }
      }

      mobileBackBtn.addEventListener("click", () => {
        closeCommentsPanel();
        feedPane.classList.remove("hidden");
        readerPane.classList.add("hidden");
        readerPane.classList.replace("flex", "hidden");
      });

      loadMoreBtn.addEventListener("click", () => {
        currentPage++;
        loadStoriesClient(currentPage);
      });

      // 100% Client-Side Hacker News Fetching
      async function loadStoriesClient(page = 1) {
        if (page > 1) {
          loadMoreBtn.textContent = "Loading...";
          loadMoreBtn.disabled = true;
        }

        try {
          // Client-side Top Story caching (15 mins)
          let topIds = JSON.parse(localStorage.getItem("hn_top_ids") || "[]");
          let lastFetch = parseInt(localStorage.getItem("hn_top_time") || "0");

          if (Date.now() - lastFetch > 15 * 60 * 1000 || topIds.length === 0) {
            const res = await fetch(
              "https://hacker-news.firebaseio.com/v0/topstories.json"
            );
            topIds = await res.json();
            localStorage.setItem("hn_top_ids", JSON.stringify(topIds));
            localStorage.setItem("hn_top_time", Date.now().toString());
          }

          if (page === 1) {
            statusDot.classList.add("bg-hn");
            statusDot.classList.remove("animate-pulse");
          }

          const limit = 15;
          const pageIds = topIds.slice((page - 1) * limit, page * limit);

          // Fetch individual story details
          const storyPromises = pageIds.map((id) =>
            fetch(`https://hacker-news.firebaseio.com/v0/item/${id}.json`).then(
              (r) => r.json()
            )
          );
          const stories = await Promise.all(storyPromises);

          stories.forEach((story, i) => {
            if (!story) return;

            const card = document.createElement("div");
            card.style.animationDelay = `${i * 20}ms`;
            card.id = `card-${story.id}`;

            const readClass = isRead(story.id) ? "is-read" : "";
            const activeClass = activeCardId === story.id ? "is-active" : "";

            card.className = `story-card bg-surface border border-borderSubtle p-4 rounded-xl hover:bg-surfaceHover hover:border-borderHover cursor-pointer flex flex-col justify-between group animate-fade-in opacity-0 shadow-sm ${readClass} ${activeClass}`;

            const domain = story.url
              ? new URL(story.url).hostname.replace("www.", "")
              : "news.ycombinator.com";
            const relativeTime = timeAgo(story.time);

            let scoreColor = "text-textMuted";
            let scoreBg = "bg-appBg";
            let scoreBorder = "border-borderSubtle";
            if (story.score > 500) {
              scoreColor = "text-hn";
              scoreBg = "bg-hn/10";
              scoreBorder = "border-hn/20";
            } else if (story.score > 100) {
              scoreColor = "text-amber-500";
              scoreBg = "bg-amber-500/10";
              scoreBorder = "border-amber-500/20";
            }

            const commentCount = story.descendants || 0;

            // NEW: Added Comments count to the card
            card.innerHTML = `
                        <div class="flex justify-between items-start mb-3">
                            <h3 class="font-medium text-[14px] leading-snug text-textMain group-hover:text-white transition-colors pr-2">${
                              story.title
                            }</h3>
                            <div class="check-icon ${
                              isRead(story.id) ? "block" : "hidden"
                            } shrink-0 mt-0.5">
                                <svg class="w-4 h-4 text-hn" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                            </div>
                        </div>
                        <div class="flex items-center justify-between pt-3 border-t border-borderSubtle/50">
                            <div class="flex gap-2">
                                <span class="inline-flex items-center text-[10px] font-mono ${scoreColor} ${scoreBg} px-2 py-0.5 rounded border ${scoreBorder}">
                                    <svg class="w-3 h-3 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
                                    ${story.score} pts
                                </span>
                                <span class="inline-flex items-center text-[10px] font-mono text-textMuted bg-appBg px-2 py-0.5 rounded border border-borderSubtle">
                                    <svg class="w-3 h-3 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
                                    ${commentCount}
                                </span>
                            </div>
                            <div class="flex items-center gap-2 text-[10px] font-mono text-textMuted">
                                <span class="truncate max-w-[80px]">${domain}</span>
                                <span class="w-1 h-1 rounded-full bg-borderHover"></span>
                                <span>${relativeTime}</span>
                            </div>
                        </div>
                    `;

            card.addEventListener("click", () => handleCardClick(story, card));
            feedList.appendChild(card);
          });

          if (page * limit < topIds.length) {
            loadMoreBtn.classList.remove("hidden");
          } else {
            loadMoreBtn.classList.add("hidden");
          }
        } catch (err) {
          if (page === 1) statusDot.classList.replace("bg-hn", "bg-red-500");
        } finally {
          if (page > 1) {
            loadMoreBtn.textContent = "Load More";
            loadMoreBtn.disabled = false;
          }
        }
      }

      async function handleCardClick(story, cardElement) {
        if (activeCardId) {
          const oldCard = document.getElementById(`card-${activeCardId}`);
          if (oldCard) oldCard.classList.remove("is-active");
        }
        activeCardId = story.id;
        currentActiveStory = story;

        cardElement.classList.add("is-active");

        if (window.innerWidth < 768) {
          feedPane.classList.add("hidden");
          readerPane.classList.remove("hidden");
          readerPane.classList.add("flex");
        }

        emptyState.classList.add("hidden");
        readerWorkspace.classList.remove("hidden");
        readerWorkspace.classList.add("flex");
        readerContent.classList.remove("hidden");
        readerContent.classList.add("flex", "flex-col");

        closeCommentsPanel();

        readerTitle.textContent = story.title;
        readerBody.innerHTML = "";

        // Source Link
        if (story.url) {
          readerLink.href = story.url;
          readerLink.classList.remove("hidden");
        } else {
          readerLink.classList.add("hidden");
        }

        readerHnBtn.classList.remove("hidden");
        commentsExternalLink.href = `https://news.ycombinator.com/item?id=${story.id}`;

        readerContent.scrollTop = 0;

        const localCacheKey = `summary_${story.id}_${currentLang}`;
        const browserCachedSummary = localStorage.getItem(localCacheKey);

        if (browserCachedSummary) {
          readerStatus.innerHTML = `<span class="w-1.5 h-1.5 rounded-full bg-hn"></span> Loaded from browser (${currentLang.toUpperCase()})`;
          readerBody.innerHTML = marked.parse(browserCachedSummary);
          applyBlankTargets(readerBody);
          applyReadState(story, cardElement);
          return;
        }

        readerStatus.innerHTML = `<span class="w-1.5 h-1.5 rounded-full bg-neutral-500 animate-pulse"></span> Fetching and analyzing...`;

        try {
          const apiKey = (localStorage.getItem("openai_api_key") || "").trim();
          const headers = {};
          if (apiKey) headers.Authorization = `Bearer ${apiKey}`;

          const res = await fetch(
            `/api/summarize?id=${encodeURIComponent(
              story.id
            )}&lang=${encodeURIComponent(currentLang)}`,
            { headers }
          );
          const data = await res.json().catch(() => ({}));
          if (res.status === 401) {
            openSettingsBtn.click();
            readerStatus.innerHTML = `<span class="w-1.5 h-1.5 rounded-full bg-amber-500"></span> Add your OpenAI API key in settings (or set OPENAI_API_KEY on the server).`;
            return;
          }
          if (!res.ok) {
            throw new Error(data.error || "Summary request failed");
          }
          const summary = data.summary;
          if (!summary) throw new Error("Empty summary");

          const statusLabel = data.cached
            ? `Server cache (${currentLang.toUpperCase()})`
            : `Generated (${currentLang.toUpperCase()})`;
          const dotClass = data.cached ? "bg-hn" : "bg-green-500";
          readerStatus.innerHTML = `<span class="w-1.5 h-1.5 rounded-full ${dotClass}"></span> ${statusLabel}`;
          readerBody.innerHTML = marked.parse(summary);
          applyBlankTargets(readerBody);

          try {
            localStorage.setItem(localCacheKey, summary);
          } catch (e) {
            console.warn("Local storage full, skipping browser cache.");
          }

          applyReadState(story, cardElement);
        } catch (err) {
          console.error(err);
          readerStatus.innerHTML = `<span class="w-1.5 h-1.5 rounded-full bg-red-500"></span> Summary failed — open settings and check your API key (or server OPENAI_API_KEY).`;
        }
      }

      renderActivityGraph();
      loadStoriesClient();
    </script>
  </body>
